name: Scrape Jail Roster

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend deps
        run: npm install

      - name: Run scraper
        run: node scrape.js

      - name: Copy data files into frontend public
        run: |
          mkdir -p frontend/public/data
          cp data/change_log.json frontend/public/data/
          cp data/stats.json frontend/public/data/
          cp data/status.json frontend/public/data/

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/change_log.json data/roster.json data/stats.json data/status.json
          git diff --cached --quiet || git commit -m "chore: scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          force_orphan: true
